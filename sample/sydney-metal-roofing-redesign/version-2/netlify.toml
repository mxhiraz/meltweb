# SMR V2 — Sydney Metal Roofing Projects (Contio-inspired bold dynamic redesign)
# Recommended Netlify site name: smr-v2 (URL: smr-v2.netlify.app)

[build]
  publish = "."

# Security headers (applied to every response)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTML: never cache the entry — keep deploys fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets: long cache (filenames are immutable per deploy)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA-style fallback: serve index.html for any unknown path
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
